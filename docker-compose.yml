services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: shopkg
      POSTGRES_USER: shopkg
      POSTGRES_PASSWORD: shopkg
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopkg -d shopkg"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://shopkg:shopkg@db:5432/shopkg
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DEBUG: "True"
      SEED_DEMO: "true"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
