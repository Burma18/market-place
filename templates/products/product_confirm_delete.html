{% extends 'base.html' %}

{% block title %}Удалить товар{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <h2 class="mb-3">Удалить товар?</h2>
        <p>Вы уверены, что хотите удалить «<strong>{{ object.title }}</strong>»?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'product-detail' object.id %}" class="btn btn-outline-secondary ms-2">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
